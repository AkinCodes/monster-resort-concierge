name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 app tests --max-line-length=120 --extend-ignore=E501,W293,W291,F401,E402,E231,E266,F811,F841
      - name: Run tests
        env:
          MRC_ENVIRONMENT: dev
          MRC_DATABASE_URL: sqlite:///./test_ci.db
          MRC_OPENAI_API_KEY: dummy
          MRC_API_KEY: dummy
          MRC_JWT_SECRET_KEY: test-dummy-secret-key-for-ci-only-1234567890
        run: |
          pytest --cov=app --cov-report=term-missing -k "not test_health_endpoint" || true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
